name: Deploy to cPanel

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: FTP Deploy to schwabinteractivebroker.com

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # public/ → ~/schwabinteractivebroker.com/  (addon domain web root)
      - name: Deploy public/ → schwabinteractivebroker.com/
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server:     ${{ secrets.FTP_SERVER }}
          username:   ${{ secrets.FTP_USERNAME }}
          password:   ${{ secrets.FTP_PASSWORD }}
          local-dir:  ./public/
          server-dir: /schwabinteractivebroker.com/
          dangerous-clean-slate: false
          log-level: verbose

      # app/ → ~/app/  (one level above web root, not web-accessible)
      - name: Deploy app/ → ~/app/
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server:     ${{ secrets.FTP_SERVER }}
          username:   ${{ secrets.FTP_USERNAME }}
          password:   ${{ secrets.FTP_PASSWORD }}
          local-dir:  ./app/
          server-dir: /app/
          dangerous-clean-slate: false
          log-level: verbose
